# ============================
# SERVER
# ============================
server.port=8085
spring.application.name=SkillBridge

# ============================
# DATABASE (MySQL)
# ============================
spring.datasource.url=jdbc:mysql://localhost:3306/skillbridge_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================
# JPA / HIBERNATE
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================
# JWT SECRET
# ============================
jwt.secret=SkillBridge2025SecretKeyForJWTAuthenticationMustBe256BitsLongAtLeast!
jwt.expiration=86400000