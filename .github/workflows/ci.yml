name: 🚀 Full Stack CI — Build Both

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── BACKEND ────────────────────────────────────────
  backend:
    name: 🔧 Backend (Spring Boot)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: skillbridge_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🏗️ Build & Package
        working-directory: backend
        run: mvn clean package -DskipTests -B
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/skillbridge_test
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          JWT_SECRET: ci-test-secret-key

      - name: ✅ Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  # ─── FRONTEND ───────────────────────────────────────
  frontend:
    name: ⚡ Frontend (React + Vite)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 🟢 Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install & Build
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8080/api

      - name: ✅ Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ─── SUMMARY ────────────────────────────────────────
  summary:
    name: 📋 Build Summary
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()

    steps:
      - name: ✅ All builds passed
        if: needs.backend.result == 'success' && needs.frontend.result == 'success'
        run: |
          echo "🎉 SkillBridge CI passed!"
          echo "✅ Backend (Spring Boot) — PASSED"
          echo "✅ Frontend (React + Vite) — PASSED"

      - name: ❌ Build failed
        if: needs.backend.result == 'failure' || needs.frontend.result == 'failure'
        run: |
          echo "❌ CI failed — check individual job logs"
          exit 1
